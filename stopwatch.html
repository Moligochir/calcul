<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title></head
  ><style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: rgb(238, 230, 230);
    }
    .container {
      background-color: rgb(43, 43, 43);
    }
    .container1 {
      display: flex;
      width: 500px;
      justify-content: space-between;
      background-color: rgb(43, 43, 43);
      padding-left: 30px;
      padding-right: 30px;
    }
    .button {
      font-size: 16px;
      background-color: rgba(128, 128, 128, 0.347);
      border-radius: 80px;
      border: none;
      width: 80px;
      height: 80px;
      cursor: pointer;
      font-weight: 500;
      color: rgba(128, 128, 128, 0.988);
    }
    .button1 {
      font-size: 16px;
      background-color: rgba(23, 101, 58, 0.956);
      border-radius: 80px;
      border: none;
      width: 80px;
      height: 80px;
      cursor: pointer;
      font-weight: 500;
      color: rgb(2, 77, 2);
    }
    .button2 {
      font-size: 16px;
      background-color: rgba(148, 47, 47, 0.956);
      border-radius: 80px;
      border: none;
      width: 80px;
      height: 80px;
      cursor: pointer;
      font-weight: 500;
      color: rgb(244, 6, 6);
    }
    .header {
      height: 70px;
      font-size: 70px;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      height: 150px;
      background-color: rgb(43, 43, 43);
    }
  </style>
  <body>
    <script>
      let a = 0;
      let b = 0;
      let c = 0;
      function displayCount() {
        console.log(setInterval);
      }
      setInterval(displayCount, 1000);
      // function timeFunc() {
      //   clearInterval(b);

      //   console.log(c);
      // }

      setTimeout(1000 * 6);

      const container = document.createElement("div");
      container.classList.add = "container";
      const container1 = document.createElement("div");
      container1.classList.add("container1");
      const header = document.createElement("h1");
      header.classList.add("header");
      header.innerText = "00:00.00";
      const button = document.createElement("button");
      button.innerText = "Lap";
      button.classList.add("button");
      const button1 = document.createElement("button");
      button1.innerText = "Start";
      button1.classList.add("button1");

      const button2 = document.createElement("button");
      button2.innerText = "Stop";
      button2.classList.add("button2");
      button2.onclick = setTimeout;
      const header1 = document.createElement("h1");
      header1.classList.add("header");
      // function time() {
      //   console.log((c = setInterval), 1000);
      // }

      container.appendChild(header);

      container.appendChild(container1);
      container1.appendChild(button);
      container1.appendChild(button1);
      container1.appendChild(button2);
      container.appendChild(header1);
      document.body.appendChild(container);
    </script>
  </body>
</html>
